name: Kari Release Pipeline

on:
  push:
    tags:
      - 'v*'   # e.g. v1.0.0

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================================
  # 0. Deterministic Pre‑Release Verification
  # ============================================================================
  verify:
    name: Deterministic Verify (make dev)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Optional Protobuf Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler || true
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6 || true
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1 || true
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check for protoc
        id: protoc_check
        run: |
          if command -v protoc >/dev/null 2>&1; then
            echo "has_protoc=true" >> $GITHUB_OUTPUT
          else
            echo "has_protoc=false" >> $GITHUB_OUTPUT
          fi

      - name: Proto Drift Check
        if: steps.protoc_check.outputs.has_protoc == 'true'
        run: make proto-check

      - name: Skip Proto Drift Check
        if: steps.protoc_check.outputs.has_protoc == 'false'
        run: echo "Skipping proto-check; protoc not installed."

      - name: Unified Deterministic Verification
        run: make dev

  # ============================================================================
  # 1. Build Rust Agent Binaries
  # ============================================================================
  build-agent:
    name: Build Rust Agent (${{ matrix.target }})
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            agent/target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Production Binary
        run: |
          cd agent
          cross build --release --target ${{ matrix.target }}

      - name: Rename Artifact
        run: mv agent/target/${{ matrix.target }}/release/kari-agent ./kari-agent-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: kari-agent-${{ matrix.target }}
          path: ./kari-agent-${{ matrix.target }}

  # ============================================================================
  # 2. Build Go API Binaries
  # ============================================================================
  build-api:
    name: Build Go API
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Build Static Binaries
        run: |
          cd api
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../kari-api-amd64 ./cmd/kari-api/main.go
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o ../kari-api-arm64 ./cmd/kari-api/main.go

      - uses: actions/upload-artifact@v4
        with:
          name: kari-api-binaries
          path: ./kari-api-*

  # ============================================================================
  # 3. Build & Push Docker Images
  # ============================================================================
  build-docker:
    name: Build & Push Docker Images
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [api, frontend, agent]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/kari-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=kari-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=kari-${{ matrix.component }}

  # ============================================================================
  # 4. Create GitHub Release
  # ============================================================================
  create-release:
    name: Create Release and Upload Assets
    needs: [build-agent, build-api, build-docker]
    runs-on: ubuntu-latest

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Files
        run: |
          mv artifacts/kari-agent-*/* .
          mv artifacts/kari-api-binaries/* .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kari-agent-*
            kari-api-*
          generate_release_notes: true
          draft: false
          prerelease: false
