name: "Kari CodeQL"

on:
  push:
    branches: [ "main", "work" ]
  pull_request:
    branches: [ "main", "work" ]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Cache CodeQL database
      # ------------------------------------------------------------
      - name: Cache CodeQL
        uses: actions/cache@v4
        with:
          path: ~/.cache/codeql
          key: ${{ runner.os }}-codeql-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-codeql-

      # ------------------------------------------------------------
      # Setup toolchains
      # ------------------------------------------------------------
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler pkg-config libssl-dev

      # ------------------------------------------------------------
      # Initialize CodeQL
      # ------------------------------------------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go, rust, javascript
          config-file: ./.github/codeql/codeql-config.yml

      # ------------------------------------------------------------
      # Manual builds
      # ------------------------------------------------------------
      - name: Build Go backend
        run: |
          cd backend
          go mod download
          go build ./...

      - name: Build Rust agent
        run: |
          cd agent
          cargo build --release

      - name: Build React frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # ------------------------------------------------------------
      # Run CodeQL analysis
      # ------------------------------------------------------------
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
