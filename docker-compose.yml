services:
  # ============================================================================
  # 🗄️ Database: PostgreSQL 16 (Hardened)
  # ============================================================================
  db:
    image: postgres:16-alpine
    container_name: kari-db
    environment:
      POSTGRES_USER: kari_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_only}
      POSTGRES_DB: kari
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/internal/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - backplane
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kari_admin -d kari"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================================
  # ⚙️ The Muscle: Rust Agent
  # ============================================================================
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile.dev
    container_name: kari-agent
    # 🛡️ Zero-Trust: Drop ALL caps, re-add only what the Muscle needs.
    # NEVER use `privileged: true` in production.
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN     # systemd scope management, cgroup v2 delegation
      - NET_ADMIN      # iptables/nftables firewall policy
      - CHOWN          # chown socket to UID 1001
      - DAC_OVERRIDE   # Write to /etc/systemd, /etc/nginx, /etc/kari/ssl
      - SETUID         # useradd for jail user provisioning
      - SETGID         # group assignment for jail users
    environment:
      - KARI_API_UID=1001
      - KARI_API_GID=1001
      - KARI_WEB_ROOT=/var/www/kari
      - KARI_SYSTEMD_DIR=/etc/systemd/system
      - RUST_LOG=info
    volumes:
      - kari_run:/var/run/kari
      - ./dev_root/etc/nginx:/etc/nginx
      - ./dev_root/etc/apache2:/etc/apache2
      - ./dev_root/var/www/kari:/var/www/kari
      - ./dev_root/etc/kari/ssl:/etc/kari/ssl
    networks:
      - backplane
    # 🛡️ SLA: Added a healthcheck for the Agent so the Brain can depend on health, not just start
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/kari/agent.sock"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================================================
  # 🧠 The Brain: Go API
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    container_name: kari-api
    user: "1001:1001"
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_healthy # 🛡️ Brain waits for Agent socket to physically exist
    environment:
      DATABASE_URL: postgres://kari_admin:${DB_PASSWORD:-dev_password_only}@db:5432/kari?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev_secret_for_testing_only}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      PORT: "8080"
      AGENT_SOCKET: /var/run/kari/agent.sock
    # 🛡️ SLA: Forensic Healthcheck verifying Brain <-> Muscle connectivity
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - "8080:8080"
    volumes:
      - kari_run:/var/run/kari
    networks:
      - backplane
      - frontend-net

  # ============================================================================
  # 💻 The UI: React
  # ============================================================================
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: kari-ui
    environment:
      INTERNAL_API_URL: http://api:8080
      PUBLIC_API_URL: http://localhost:8080
      JWT_SECRET: ${JWT_SECRET:-dev_secret_for_testing_only}
    ports:
      - "5173:5173"
    networks:
      - frontend-net
    depends_on:
      api:
        condition: service_healthy # 🛡️ UI waits for Brain <-> Muscle link verification

networks:
  backplane:
    internal: true
  frontend-net:
    driver: bridge

volumes:
  postgres_data:
  kari_run:
